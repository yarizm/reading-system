# 1. 服务器端口配置
server:
  port: 8090

spring:
  application:
    name: reading-system

  # 2. 数据库连接配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smartreader?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}

  # 3. Redis 连接配置 (用于缓存)
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200
  # 5. 文件上传限制 (为后续上传书籍做准备)
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB      # 单个文件的最大上限
      max-request-size: 200MB   # 单次请求的总大小上限

# 4. MyBatis Plus 配置
mybatis-plus:
  configuration:
    # 开启 SQL 日志打印
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # 驼峰下划线转换
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted # 如果后续要做逻辑删除可以保留


# 自定义文件上传路径
file:
  upload-path: D:/WORK/reading-system-files/  # 请确保这个盘符存在，或者改成你喜欢的路径
ai:
  dashscope:
    api-key: ${QWEN_API_KEY}
  enable-recommendation: true
tts:
  provider: lightweight
  lightweight:
    base-url: "http://localhost:8091"
    timeout-ms: 60000
  dashscope:
    enabled: true
dify:
  reading:
    api-url: ${DIFY_CHAT_URL}
    api-key: ${DIFY_READING_KEY}
  recommend:
    api-url: ${DIFY_CHAT_URL}
    api-key: ${DIFY_RECOMMEND_KEY}

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.example.reading: INFO
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.apache.ibatis: WARN
    org.mybatis: WARN
    com.baomidou: WARN
    org.springframework.data.redis: WARN
    io.lettuce.core: WARN
    org.elasticsearch.client: WARN
    reactor.netty: WARN
