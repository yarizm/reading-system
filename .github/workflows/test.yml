name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile backend
        run: mvn -q -DskipTests compile

  reading-ui:
    name: Desktop frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reading-ui/package-lock.json

      - name: Install dependencies
        working-directory: reading-ui
        run: npm ci

      - name: Build
        working-directory: reading-ui
        run: npm run build

  reading-mobile-ui:
    name: Mobile frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reading-mobile-ui/package-lock.json

      - name: Install dependencies
        working-directory: reading-mobile-ui
        run: npm ci

      - name: Build
        working-directory: reading-mobile-ui
        run: npm run build

  tts:
    name: TTS Python check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lightweight-tts-service/requirements.txt

      - name: Install dependencies
        working-directory: lightweight-tts-service
        run: python -m pip install -r requirements.txt

      - name: Compile Python entrypoint
        working-directory: lightweight-tts-service
        run: python -m py_compile app.py
